        /* 基础与隐藏默认鼠标 */
        body {

        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* --- 自定义科技鼠标 --- */
        #cursor-dot {
            width: 6px;
            height: 6px;
            background-color: white;
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        #cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s;
        }
        body.hovering-link #cursor-dot {
            width: 0; height: 0; opacity: 0;
        }
        body.hovering-link #cursor-outline {
            width: 60px; height: 60px;
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(2px);
        }

        /* --- 滚动渐显与视差 --- */
        .reveal {
            opacity: 0;
            /* 为爆点回弹做准备，初始缩小 */
            transform: translateY(80px) scale(0.85);
            /* 张力回弹动画 2秒 */
            transition: all 2s cubic-bezier(0.34, 1.8, 0.64, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .parallax-layer {
            transition: transform 0.1s linear;
        }

        /* ==========================================
            核心修改：去除擦除动效，保留渐变颜色
            ========================================== */
        .hero-title {
            position: relative;

            font-size: clamp(3rem, 8vw, 6rem); 
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.02em;
            
            /* 改为纯白色 */
            color: #ffffff;
            
            display: inline-block;
            margin-bottom: 0; 
            user-select: none;
        }

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px) scale(1.01);
            background: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8), 0 0 20px -5px var(--tw-color-tech-glow);
        }
        .image-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5,5,5,1) 0%, rgba(5,5,5,0) 50%);
            pointer-events: none;
        }

        /* 极光网格背景 */

        }

        // ==========================================
        function runIntroAnimation() {
            const vh = window.innerHeight;
            const heroElements = document.querySelectorAll('#app-container .reveal');
            
            // 仅保留首屏元素的平滑错位浮现效果，去掉加载遮罩层
            heroElements.forEach((el, i) => {
                if(el.getBoundingClientRect().top < vh) { 
                    gsap.to(el, {
                        opacity: 1,
                        y: 0,
                        scale: 1,
                        duration: 1.5,
                        delay: i * 0.15,
                        ease: "power3.out"
                    });
                    // 防止被滚动监听重复触发
                    el.classList.add('active');
                }
            });

            // 稍微延迟后初始化常规的滚动监听动画
            setTimeout(initRevealAnimation, 100);
        }

        // ==========================================
        // --- 常规滚动侦听动画 ---
        // ==========================================
        function initRevealAnimation() {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach((reveal) => {
                const elementTop = reveal.getBoundingClientRect().top;
                if (elementTop < window.innerHeight - 100) {
                    reveal.classList.add('active');
                }
            });
            
            const onScroll = () => {
                reveals.forEach((reveal) => {
                    const elementTop = reveal.getBoundingClientRect().top;
                    if (elementTop < window.innerHeight - 100) {
                        reveal.style.opacity = '1';
                        reveal.style.transform = 'translateY(0) scale(1)';
                    }
                });

                const parallaxLayers = document.querySelectorAll('.parallax-layer');
                parallaxLayers.forEach((layer, index) => {
                    const speed = 0.03 * (index + 1);
                    const yPos = -(window.scrollY * speed);
                    layer.style.transform = `translateY(${yPos}px)`;
                });
            };

            window.addEventListener('scroll', onScroll, { passive: true });
            setTimeout(onScroll, 100);
        }

        // ==========================================
        // ===== Light Rays WebGL 背景动画逻辑 ========
        // ==========================================
        async function initLightRays() {
            const container = document.querySelector('.hero-container');
            if (!container) return;

            // 清理上一个实例
            if (lightRaysCleanup) {
                lightRaysCleanup();
                lightRaysCleanup = null;
            }

            try {
                // 动态拉取您提供的 ogl 核心组件
                const { Renderer, Program, Triangle, Mesh } = await import('https://esm.sh/ogl');

                const renderer = new Renderer({
                    dpr: Math.min(window.devicePixelRatio, 2),
                    alpha: true
                });
                
                const gl = renderer.gl;
                gl.canvas.style.position = 'absolute';
                gl.canvas.style.top = '0';
                gl.canvas.style.left = '0';
                gl.canvas.style.width = '100%';
                gl.canvas.style.height = '100%';
                gl.canvas.style.pointerEvents = 'none'; // 确保鼠标事件穿透
                gl.canvas.style.zIndex = '0'; // 将光芒置于背景
                
                container.insertBefore(gl.canvas, container.firstChild);

                const hexToRgb = hex => {
                    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                    return m ? [parseInt(m[1], 16) / 255, parseInt(m[2], 16) / 255, parseInt(m[3], 16) / 255] : [1, 1, 1];
                };

                const getAnchorAndDir = (origin, w, h) => {
                    const outside = 0.2;
                    switch (origin) {
                        case 'top-left': return { anchor: [0, -outside * h], dir: [0, 1] };
                        case 'top-right': return { anchor: [w, -outside * h], dir: [0, 1] };
                        case 'left': return { anchor: [-outside * w, 0.5 * h], dir: [1, 0] };
                        case 'right': return { anchor: [(1 + outside) * w, 0.5 * h], dir: [-1, 0] };
                        case 'bottom-left': return { anchor: [0, (1 + outside) * h], dir: [0, -1] };
                        case 'bottom-center': return { anchor: [0.5 * w, (1 + outside) * h], dir: [0, -1] };
                        case 'bottom-right': return { anchor: [w, (1 + outside) * h], dir: [0, -1] };
                        default: return { anchor: [0.5 * w, -outside * h], dir: [0, 1] };
                    }
                };

                // User settings based on props provided in prompt
                const raysOrigin = 'top-center';
                const raysColor = '#ffffff';
                const raysSpeed = 1;
                const lightSpread = 0.5;
                const rayLength = 3;
                const pulsating = false;
                const fadeDistance = 1.0;
                const saturation = 1.0;
                const followMouse = true;
                const mouseInfluence = 0.1;
                const noiseAmount = 0.0;
                const distortion = 0.0;

                const uniforms = {
                    iTime: { value: 0 },
                    iResolution: { value: [1, 1] },
                    rayPos: { value: [0, 0] },
                    rayDir: { value: [0, 1] },
                    raysColor: { value: hexToRgb(raysColor) },
                    raysSpeed: { value: raysSpeed },
                    lightSpread: { value: lightSpread },
                    rayLength: { value: rayLength },
                    pulsating: { value: pulsating ? 1.0 : 0.0 },
                    fadeDistance: { value: fadeDistance },
                    saturation: { value: saturation },
                    mousePos: { value: [0.5, 0.5] },
                    mouseInfluence: { value: mouseInfluence },
                    noiseAmount: { value: noiseAmount },
                    distortion: { value: distortion }
                };

                const vert = `
                    attribute vec2 position;
                    varying vec2 vUv;
                    void main() {
                        vUv = position * 0.5 + 0.5;
                        gl_Position = vec4(position, 0.0, 1.0);
                    }
                `;

                const frag = `
                    precision highp float;
                    uniform float iTime;
                    uniform vec2  iResolution;
                    uniform vec2  rayPos;
                    uniform vec2  rayDir;
                    uniform vec3  raysColor;
                    uniform float raysSpeed;
                    uniform float lightSpread;
                    uniform float rayLength;
                    uniform float pulsating;
                    uniform float fadeDistance;
                    uniform float saturation;
                    uniform vec2  mousePos;
                    uniform float mouseInfluence;
                    uniform float noiseAmount;
                    uniform float distortion;
                    varying vec2 vUv;
                    
                    float noise(vec2 st) {
                        return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
                    }
                    
                    float rayStrength(vec2 raySource, vec2 rayRefDirection, vec2 coord, float seedA, float seedB, float speed) {
                        vec2 sourceToCoord = coord - raySource;
                        vec2 dirNorm = normalize(sourceToCoord);
                        float cosAngle = dot(dirNorm, rayRefDirection);
                        float distortedAngle = cosAngle + distortion * sin(iTime * 2.0 + length(sourceToCoord) * 0.01) * 0.2;   
                        float spreadFactor = pow(max(distortedAngle, 0.0), 1.0 / max(lightSpread, 0.001));
                        float distance = length(sourceToCoord);
                        float maxDistance = iResolution.x * rayLength;
                        float lengthFalloff = clamp((maxDistance - distance) / maxDistance, 0.0, 1.0);    
                        float fadeFalloff = clamp((iResolution.x * fadeDistance - distance) / (iResolution.x * fadeDistance), 0.5, 1.0);
                        float pulse = pulsating > 0.5 ? (0.8 + 0.2 * sin(iTime * speed * 3.0)) : 1.0;
                        float baseStrength = clamp(
                            (0.45 + 0.15 * sin(distortedAngle * seedA + iTime * speed)) +
                            (0.3 + 0.2 * cos(-distortedAngle * seedB + iTime * speed)),
                            0.0, 1.0
                        );
                        return baseStrength * lengthFalloff * fadeFalloff * spreadFactor * pulse;
                    }
                    
                    void mainImage(out vec4 fragColor, in vec2 fragCoord) {
                        vec2 coord = vec2(fragCoord.x, iResolution.y - fragCoord.y);    
                        vec2 finalRayDir = rayDir;
                        
                        if (mouseInfluence > 0.0) {
                            vec2 mouseScreenPos = mousePos * iResolution.xy;
                            vec2 mouseDirection = normalize(mouseScreenPos - rayPos);
                            finalRayDir = normalize(mix(rayDir, mouseDirection, mouseInfluence));
                        }
                        
                        vec4 rays1 = vec4(1.0) * rayStrength(rayPos, finalRayDir, coord, 36.2214, 21.11349, 1.5 * raysSpeed);
                        vec4 rays2 = vec4(1.0) * rayStrength(rayPos, finalRayDir, coord, 22.3991, 18.0234, 1.1 * raysSpeed);
                        fragColor = rays1 * 0.5 + rays2 * 0.4;
                        
                        if (noiseAmount > 0.0) {
                            float n = noise(coord * 0.01 + iTime * 0.1);
                            fragColor.rgb *= (1.0 - noiseAmount + noiseAmount * n);
                        }
                        
                        float brightness = 1.0 - (coord.y / iResolution.y);
                        fragColor.x *= 0.1 + brightness * 0.8;
                        fragColor.y *= 0.3 + brightness * 0.6;
                        fragColor.z *= 0.5 + brightness * 0.5;
                        
                        if (saturation != 1.0) {
                            float gray = dot(fragColor.rgb, vec3(0.299, 0.587, 0.114));
                            fragColor.rgb = mix(vec3(gray), fragColor.rgb, saturation);
                        }
                        fragColor.rgb *= raysColor;
                    }
                    
                    void main() {
                        vec4 color;
                        mainImage(color, gl_FragCoord.xy);
                        gl_FragColor  = color;
                    }
                `;

                const geometry = new Triangle(gl);
                const program = new Program(gl, { vertex: vert, fragment: frag, uniforms });
                const mesh = new Mesh(gl, { geometry, program });

                let animationId;
                const targetMouse = { x: 0.5, y: 0.5 };
                const smoothMouse = { x: 0.5, y: 0.5 };

                const updatePlacement = () => {
                    if (!container) return;
                    const wCSS = container.clientWidth;
                    const hCSS = container.clientHeight;
                    renderer.setSize(wCSS, hCSS);
                    const w = wCSS * renderer.dpr;
                    const h = hCSS * renderer.dpr;
                    uniforms.iResolution.value = [w, h];
                    const { anchor, dir } = getAnchorAndDir(raysOrigin, w, h);
                    uniforms.rayPos.value = anchor;
                    uniforms.rayDir.value = dir;
                };

                const handleMouseMove = e => {
                    const rect = container.getBoundingClientRect();
                    targetMouse.x = (e.clientX - rect.left) / rect.width;
                    targetMouse.y = (e.clientY - rect.top) / rect.height;
                };

                if (followMouse) {
                    window.addEventListener('mousemove', handleMouseMove);
                }
                
                window.addEventListener('resize', updatePlacement);
                updatePlacement();

                const loop = t => {
                    uniforms.iTime.value = t * 0.001;
                    if (followMouse && mouseInfluence > 0.0) {
                        const smoothing = 0.92;
                        smoothMouse.x = smoothMouse.x * smoothing + targetMouse.x * (1 - smoothing);
                        smoothMouse.y = smoothMouse.y * smoothing + targetMouse.y * (1 - smoothing);
                        uniforms.mousePos.value = [smoothMouse.x, smoothMouse.y];
                    }
                    renderer.render({ scene: mesh });
                    animationId = requestAnimationFrame(loop);
                };
                
                animationId = requestAnimationFrame(loop);

                // 绑定销毁逻辑以备调用
                lightRaysCleanup = () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('resize', updatePlacement);
                    window.removeEventListener('mousemove', handleMouseMove);
                    if (renderer && renderer.gl) {
                        const loseContextExt = renderer.gl.getExtension('WEBGL_lose_context');
                        if (loseContextExt) loseContextExt.loseContext();
                        if (gl.canvas && gl.canvas.parentNode) {
                            gl.canvas.parentNode.removeChild(gl.canvas);
                        }
                    }
                };

            } catch (error) {
                console.warn('Light Rays WebGL 动画初始化失败:', error);
            }
        }

        // --- 自定义科技感光标系统 ---
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let outlineX = mouseX;
        let outlineY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = `${mouseX}px`;
            cursorDot.style.top = `${mouseY}px`;
        });

        function animateCursor() {
            const easing = 0.15;
            outlineX += (mouseX - outlineX) * easing;
            outlineY += (mouseY - outlineY) * easing;
            cursorOutline.style.left = `${outlineX}px`;
            cursorOutline.style.top = `${outlineY}px`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        function initInteractiveElements() {
            const interactives = document.querySelectorAll('.interactive-element, a, button, .hero-title');
            interactives.forEach(el => {
                el.addEventListener('mouseenter', () => document.body.classList.add('hovering-link'));
                el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-link'));
            });
        }

        // 浏览器历史接管
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.view === 'project') {
                navigate('project', e.state.id);
            } else {
                navigate('home');
            }
        });

        // 启动应用
        window.onload = () => {
            gsap.registerPlugin(ScrollTrigger);
            const hash = window.location.hash.substring(1);
            if (hash && projectsData[hash]) {
                navigate('project', hash);
            } else {
                navigate('home');
            }
        };

    </script>
</body>
